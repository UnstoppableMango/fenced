name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: cachix/install-nix-action@v31.10.4
        with:
          github_access_token: ${{ github.token }}

      - uses: cachix/cachix-action@v16
        with:
          name: unstoppablemango
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - run: nix develop -c golangci-lint run

  build:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: cachix/install-nix-action@v31.10.4
        with:
          github_access_token: ${{ github.token }}

      - uses: cachix/cachix-action@v16
        with:
          name: unstoppablemango
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - run: >
          nix develop -c ginkgo run -r
          --race
          --trace
          --randomize-all
          --github-output
          --cover

      - uses: codecov/codecov-action@v5.5.2
        with:
          use_oidc: true
          fail_ci_if_error: true
          files: coverprofile.out

  container:
    name: Docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: redhat-actions/podman-install@main
        with:
          github-token: ${{ github.token }}

      - uses: cachix/install-nix-action@v31.10.4
        with:
          github_access_token: ${{ github.token }}

      - uses: cachix/cachix-action@v16
        with:
          name: unstoppablemango
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - run: make load

      - id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - run: |
          TAGS="$(echo '${{ steps.meta.outputs.tags }}' | tr '\n' ' ')"
          echo "TAGS=$TAGS" >> "$GITHUB_ENV"

      - run: |
          VERSION="$(nix run .#version)"
          podman image tag "fenced:${VERSION}" ${{ env.TAGS }}

      - uses: redhat-actions/podman-login@v1
        if: github.ref_name == 'main'
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - if: github.ref_name == 'main'
        run: podman push ${{ env.TAGS }}

  clean:
    name: Clean
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: cachix/install-nix-action@v31.10.4
        with:
          github_access_token: ${{ github.token }}

      - uses: cachix/cachix-action@v16
        with:
          name: unstoppablemango
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - run: nix develop -c make deps
      - run: git diff --exit-code
